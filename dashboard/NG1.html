<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Naogaon PBS-1 Dashboard</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f7fb}
.nav{display:flex;gap:10px;background:#2d9cff;color:#fff;padding:10px}
.nav button{background:#fff;color:#2d9cff;border:none;padding:8px 14px;border-radius:6px;font-weight:600;cursor:pointer}
.page{display:none;padding:10px}
.page.active{display:block}
iframe{width:100%;height:80vh;border:none}

.filter{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
select,input,button{padding:6px;border-radius:6px;border:1px solid #ccc}

table{width:100%;border-collapse:collapse;background:#fff;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#eaf3ff}
.toggle-btn{background:#2d9cff;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;margin-left:10px}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

<div class="nav">
  <button onclick="showPage('monitor')">Feeder Monitor</button>
  <button onclick="showPage('history')">Feeder History</button>
  <button onclick="showPage('saifi')">SAIFI / SAIDI</button>
</div>

<div class="page active" id="monitor">
  <iframe src="sodor.html"></iframe>
</div>

<div class="page" id="history">
  <div class="filter">
    <select id="feederFilter"><option value="">All Feeders</option></select>
    <select id="eventFilter">
      <option value="">All Events</option>
      <option value="OFF → ON">OFF → ON</option>
      <option value="ON → OFF">ON → OFF</option>
    </select>
    <input type="date" id="fromDate">
    <input type="date" id="toDate">
    <button onclick="applyFilter()">Apply</button>
    <button onclick="exportExcel()">⬇ Excel</button>
    <button onclick="exportHistoryPDF()">📄 PDF</button>
  </div>

  <table id="historyTable">
    <thead>
      <tr>
        <th>Timestamp</th><th>Feeder</th><th>Event</th>
        <th>Status</th><th>Duration(s)</th><th>Last Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="page" id="saifi">
  <div class="filter">
    <input type="month" id="saifiMonthFilter">
    <button onclick="applySAIFIFilter()">Apply</button>
    <button onclick="exportSAIDIPDF()">📄 PDF</button>
    <button class="toggle-btn" onclick="toggleChartTable()">Toggle Chart/Table</button>
  </div>

  <canvas id="chart" height="120"></canvas>

  <table id="saidiTable">
    <thead>
      <tr>
        <th>Month</th><th>Feeder</th><th>Customers</th><th>Interruptions</th>
        <th>Outage Minutes</th><th>SAIFI</th><th>SAIDI</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxD3HhbOsw8e_Nrcwckc1rI-6S8ytQrSg6Gz6ToDh9el7uXfriqWf2Ubb16VolgrXVWWw/exec";
let dataCache, chart, currentPage='monitor';
let chartVisible = true;

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentPage=id;
  loadData(id);
}

async function loadData(page){
  try{
    const r=await fetch(WEB_APP_URL);
    dataCache=await r.json();
  }catch(e){console.error("Failed to fetch data:",e); return;}

  if(page==="history") initHistory();
  if(page==="saifi") drawChart();
}

// -----------------------------
// History
// -----------------------------
function initHistory(){
  const feeders=[...new Set(dataCache.history.map(r=>r.FeederID))];
  feederFilter.innerHTML='<option value="">All Feeders</option>';
  feeders.forEach(f=>feederFilter.innerHTML+=`<option>${f}</option>`);
  renderHistoryTable(dataCache.history);
}

function formatTimestamp(t){
  const d=new Date(t);
  const day=String(d.getDate()).padStart(2,'0');
  const month=String(d.getMonth()+1).padStart(2,'0');
  const year=d.getFullYear();
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  return `${day}/${month}/${year}, ${hh}:${mm}:${ss}`;
}

function renderHistoryTable(rows){
  const tb=document.querySelector("#historyTable tbody");
  tb.innerHTML="";
  rows.forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${formatTimestamp(r.Timestamp)}</td>
                  <td>${r.FeederID}</td>
                  <td>${r.Event}</td>
                  <td>${r.Status}</td>
                  <td>${r.DurationSeconds}</td>
                  <td>${r.LastStatus}</td>`;
    tb.appendChild(tr);
  });
}

function applyFilter(){
  let f=[...dataCache.history];
  if(feederFilter.value) f=f.filter(r=>r.FeederID===feederFilter.value);
  if(eventFilter.value) f=f.filter(r=>r.Event===eventFilter.value);
  if(fromDate.value) f=f.filter(r=>new Date(r.Timestamp)>=new Date(fromDate.value));
  if(toDate.value) f=f.filter(r=>new Date(r.Timestamp)<=new Date(toDate.value+"T23:59:59"));
  renderHistoryTable(f);
}

function exportExcel(){
  const wb=XLSX.utils.table_to_book(historyTable);
  XLSX.writeFile(wb,"FeederHistory.xlsx");
}

function exportHistoryPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const headers=[["Timestamp","Feeder","Event","Status","Duration(s)","Last Status"]];
  const data=Array.from(document.querySelectorAll("#historyTable tbody tr"))
                  .map(tr=>Array.from(tr.children).map(td=>td.textContent));
  doc.autoTable({ head: headers, body: data });
  const blob = doc.output("blob");
  const url = URL.createObjectURL(blob);
  window.open(url,"_blank");
}

// -----------------------------
// SAIFI / SAIDI
// -----------------------------
function drawChart(){
  let r=[...dataCache.reliability];

  if(saifiMonthFilter.value){
    r=r.filter(x=>x.Month.startsWith(saifiMonthFilter.value));
  }

  const tb=document.querySelector("#saidiTable tbody");
  tb.innerHTML="";
  r.forEach(x=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${formatTimestamp(x.Month)}</td>
                  <td>${x.FeederID}</td>
                  <td>${x.Customers}</td>
                  <td>${x.Interruptions}</td>
                  <td>${x.OutageMinutes}</td>
                  <td>${x.SAIFI}</td>
                  <td>${x.SAIDI}</td>`;
    tb.appendChild(tr);
  });

  const labels=r.map(x=>x.FeederID);
  const saifi=r.map(x=>parseFloat(x.SAIFI));
  const saidi=r.map(x=>parseFloat(x.SAIDI));

  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{ labels, datasets:[
      {label:"SAIFI",data:saifi,backgroundColor:"#2d9cff"},
      {label:"SAIDI",data:saidi,backgroundColor:"#e74c3c"}
    ]},
    options:{responsive:true,scales:{y:{beginAtZero:true}}}
  });

  // Show/hide based on toggle
  document.getElementById("chart").style.display=chartVisible?"block":"none";
  document.getElementById("saidiTable").style.display=chartVisible?"none":"table";
}

function applySAIFIFilter(){ drawChart(); }

function toggleChartTable(){
  chartVisible=!chartVisible;
  document.getElementById("chart").style.display=chartVisible?"block":"none";
  document.getElementById("saidiTable").style.display=chartVisible?"none":"table";
}

function exportSAIDIPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const headers=[["Month","Feeder","Customers","Interruptions","Outage Minutes","SAIFI","SAIDI"]];
  const data=Array.from(document.querySelectorAll("#saidiTable tbody tr"))
                  .map(tr=>Array.from(tr.children).map(td=>td.textContent));
  doc.autoTable({ head: headers, body: data });
  const blob = doc.output("blob");
  const url = URL.createObjectURL(blob);
  window.open(url,"_blank");
}

// Auto-refresh
setInterval(()=>{
  if(document.getElementById("history").classList.contains("active") ||
     document.getElementById("saifi").classList.contains("active")){
    loadData(currentPage);
  }
},60000);

loadData("monitor");
</script>

</body>
</html>
